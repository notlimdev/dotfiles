# KEYMAPS NATIVOS (fallback cuando hy3 esta desactivado)
# Objetivo: mantener combinaciones similares a tus keymaps de hy3.

# Variante vim-like para foco
bind = $mainMod SHIFT, h, movefocus, l
bind = $mainMod SHIFT, j, movefocus, d
bind = $mainMod SHIFT, k, movefocus, u
bind = $mainMod SHIFT, l, movefocus, r
# Foco entre ventanas
bind = $mainMod SHIFT, left, movefocus, l
bind = $mainMod SHIFT, right, movefocus, r
bind = $mainMod SHIFT, up, movefocus, u
bind = $mainMod SHIFT, down, movefocus, d

# Mover ventana activa (manteniendo tus combinaciones de modificadores)
bind = $mainMod+SHIFT+CONTROL, h, movewindow, l
bind = $mainMod+SHIFT+CONTROL, j, movewindow, d
bind = $mainMod+SHIFT+CONTROL, k, movewindow, u
bind = $mainMod+SHIFT+CONTROL, l, movewindow, r
bind = $mainMod+SHIFT+CONTROL, left, movewindow, l
bind = $mainMod+SHIFT+CONTROL, right, movewindow, r
bind = $mainMod+SHIFT+CONTROL, up, movewindow, u
bind = $mainMod+SHIFT+CONTROL, down, movewindow, d

# Variante alternativa (igual que tu esquema actual)
bind = $mainMod+CONTROL, h, movewindow, l
bind = $mainMod+CONTROL, j, movewindow, d
bind = $mainMod+CONTROL, k, movewindow, u
bind = $mainMod+CONTROL, l, movewindow, r
bind = $mainMod+CONTROL, left, movewindow, l
bind = $mainMod+CONTROL, down, movewindow, d
bind = $mainMod+CONTROL, up, movewindow, u
bind = $mainMod+CONTROL, right, movewindow, r

# kill window

bind = $mainMod, z , killactive
